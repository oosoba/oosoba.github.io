<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} · Osonde A. Osoba</title>
  <meta name="description" content="{{SUMMARY}}">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preload" href="../assets/fonts/lexend-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/code.css">
  <link rel="stylesheet" href="../assets/katex/katex.min.css">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{SUMMARY}}">
  <meta property="og:type" content="article">
</head>
<body class="post">
  <div class="post-wrap">
    <nav class="post-nav"><a href="../index.html#writing">&larr; Osonde A. Osoba &middot; Writing</a></nav>
    <article class="post-article">
      <h1 class="post-title">{{TITLE}}</h1>
      <div class="post-meta">{{META}}</div>
{{CONTENT}}
    </article>
    <footer class="post-footer">&copy; <span id="year">2026</span> Osonde A. Osoba &middot; <a href="../index.html#writing">More writing</a></footer>
  </div>
  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
  <script defer src="../assets/katex/katex.min.js"></script>
  <script defer src="../assets/katex/auto-render.min.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      if (window.renderMathInElement) {
        renderMathInElement(document.querySelector('.post-article'), {
          delimiters: [
            { left: '\\[', right: '\\]', display: true },
            { left: '\\(', right: '\\)', display: false }
          ],
          throwOnError: false
        });
      }
    });
  </script>
</body>
</html>
